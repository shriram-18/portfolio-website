<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Loading...</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
    </div>

    <!-- Navigation -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="#hero" id="nav-logo">Portfolio</a>
            </div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="./assets/Shriram_Patil_Resume.pdf" target="_blank" class="nav-resume-btn">Resume</a></li>
                <li><button id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon"></i></button></li>
            </ul>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </nav>
    </header>

    <main id="app-content" style="display: none;">
        <!-- Hero Section -->
        <section id="hero" class="hero fade-in-section">
            <div class="container hero-content">
                <h1 class="hero-title">Hi, I'm <span id="hero-name" class="highlight">...</span></h1>
                <h2 class="hero-subtitle" id="hero-title">...</h2>
                <div class="hero-buttons">
                    <a href="./assets/Shriram_Patil_Resume.pdf" target="_blank" class="btn btn-primary">View Resume</a>
                    <a href="#projects" class="btn btn-secondary glass">View Projects</a>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="about py-section fade-in-section">
            <div class="container">
                <h2 class="section-title">About Me</h2>
                <div class="about-content">
                    <p id="about-bio" class="about-bio"></p>
                    <div class="social-links" id="social-links">
                        <!-- injected by JS -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Skills Section -->
        <section id="skills" class="skills bg-alt py-section fade-in-section">
            <div class="container">
                <h2 class="section-title">My Skills</h2>
                <div class="skills-grid" id="skills-grid">
                    <!-- Skills will be injected here -->
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="projects py-section fade-in-section">
            <div class="container">
                <h2 class="section-title">Projects</h2>
                <div class="projects-grid" id="projects-grid">
                    <!-- Projects will be injected here -->
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="contact bg-alt py-section fade-in-section">
            <div class="container">
                <h2 class="section-title">Get In Touch</h2>
                <div class="text-center" style="margin-bottom: 2rem;">
                    <p>Want to see more details? <a href="./assets/Shriram_Patil_Resume.pdf" target="_blank" class="resume-text-link">View Resume</a></p>
                </div>
                <form id="contact-form" class="contact-form glass-panel">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="Your Email">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Your Message"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                        <span>Send Message</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                    <div id="form-status" class="form-status"></div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; <span id="year"></span> <span id="footer-name"></span>. All rights reserved.</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="js/app.js"></script>
</body>
</html>
